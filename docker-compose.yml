services:
  db:
    image: postgres:18-alpine

    environment:
      POSTGRES_DB: webhooks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webhooks"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/webhooks
      APP_SECRET: ${APP_SECRET}
      ENVIRONMENT: development

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: