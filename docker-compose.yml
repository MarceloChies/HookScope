services:
  db:
    image: postgres:18-alpine

    environment:
      POSTGRES_DB: webhooks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webhooks"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/webhooks
      ENVIRONMENT: development

    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - "server"

volumes:
  postgres_data: